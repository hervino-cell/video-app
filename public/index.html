<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lets Meet Powered By Hervinism</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎥 Lets Meet</h1>
            <div class="room-controls">
                <input type="text" id="roomInput" placeholder="Nom de la salle" value="room1">
                <button id="joinBtn">▶️ Rejoindre</button>
                <button id="leaveBtn" disabled>⏹️ Quitter</button>
                <div id="roomInfo"></div>
            </div>
        </header>
        
        <div id="status" class="status info">🔌 Connecté au serveur - Cliquez sur "Rejoindre"</div>
        
        <div id="videosContainer" class="videos"></div>
        
        <div class="local-controls">
            <button id="toggleAudio" disabled>🔊 Audio ON</button>
            <button id="toggleVideo" disabled>📹 Vidéo ON</button>
        </div>
    </div>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- mediasoup-client via unpkg (more reliable for this package) -->
    <script src="https://unpkg.com/mediasoup-client@3.7.6/dist/mediasoup-client.min.js"></script>

    <!-- Verify mediasoup loaded before client.js runs -->
    <script>
        if (typeof window.mediasoupClient === 'undefined') {
            document.getElementById('status').textContent = '❌ Erreur: mediasoup-client CDN failed to load.';
            document.getElementById('status').className = 'status error';
            console.error('mediasoup-client failed to load from CDN');
        } else {
            console.log('✅ mediasoup-client loaded OK');
        }
    </script>

    <script src="client.js"></script>
</body>
</html>
