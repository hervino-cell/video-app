<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By Powered By Hervinism</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎥 Lets Meet</h1>
            <div class="room-controls">
                <input type="text" id="roomInput" placeholder="Nom de la salle" value="room1">
                <button id="joinBtn">▶️ Rejoindre</button>
                <button id="leaveBtn" disabled>⏹️ Quitter</button>
                <div id="roomInfo"></div>
            </div>
        </header>
        
        <div id="status" class="status info">🔌 Connecté au serveur - Cliquez sur "Rejoindre"</div>
        
        <div id="videosContainer" class="videos"></div>
        
        <div class="local-controls">
            <button id="toggleAudio" disabled>🔊 Audio ON</button>
            <button id="toggleVideo" disabled>📹 Vidéo ON</button>
        </div>
    </div>

    <!-- Socket.IO from CDN (reliable) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- mediasoup-client served directly from YOUR server (no CDN issues) -->
    <script src="/mediasoup-client.js"></script>

    <!-- Safety check -->
    <script>
        if (typeof mediasoupClient === 'undefined') {
            document.getElementById('status').textContent = '❌ Erreur fatale: mediasoup-client non chargé. Vérifiez les logs serveur.';
            document.getElementById('status').className = 'status error';
        }
    </script>

    <script src="client.js"></script>
</body>
</html>
